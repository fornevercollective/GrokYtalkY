<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0c" />
  <title>GrokYtalkY · Sphere Glyph · 16K venue</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { height: 100%; overflow: hidden; }
    body.sphere-body {
      margin: 0; background: #07070a; color: #eee;
      font-family: "Instrument Sans", system-ui, sans-serif;
      display: flex; flex-direction: column; height: 100dvh;
    }
    .sp-wrap { position: relative; flex: 1; min-height: 0; }
    #sp-gl, #sp-hud {
      position: absolute; inset: 0; width: 100%; height: 100%; display: block;
    }
    #sp-hud { pointer-events: none; z-index: 2; }
    .sp-bar {
      position: absolute; left: 0; right: 0; bottom: 0; z-index: 3;
      display: flex; flex-wrap: wrap; gap: 0.35rem; align-items: center;
      padding: 0.5rem 0.65rem max(0.5rem, env(safe-area-inset-bottom));
      background: linear-gradient(transparent, rgba(7,7,10,0.94) 22%);
      pointer-events: auto;
    }
    .sp-bar input[type=text] {
      flex: 1 1 10rem; min-width: 7rem;
      background: #12121a; border: 1px solid #2a2a36; border-radius: 8px;
      color: #eee; padding: 0.4rem 0.55rem;
      font: 0.72rem/1.2 "IBM Plex Mono", ui-monospace, monospace;
    }
    .sp-bar button, .sp-bar select {
      appearance: none; border: 1px solid #333; background: #15151c; color: #ddd;
      border-radius: 8px; padding: 0.4rem 0.55rem;
      font: 600 0.72rem/1 system-ui, sans-serif; cursor: pointer;
    }
    .sp-bar button.primary { background: #6ee7b7; color: #042; border-color: transparent; }
    .sp-bar button.is-on { outline: 2px solid #6ee7b7; }
    .sp-bar select {
      font: 0.68rem/1.2 "IBM Plex Mono", ui-monospace, monospace; max-width: 9rem;
    }
    .sp-bar label {
      font: 0.62rem/1 "IBM Plex Mono", ui-monospace, monospace; color: #6b6b7a;
      display: flex; align-items: center; gap: 0.25rem;
    }
    .sp-bar input[type=range] { width: 4.5rem; padding: 0; }
    .sp-status {
      position: absolute; top: 0.45rem; left: 0.65rem; right: 12rem; z-index: 3;
      font: 0.68rem/1.4 "IBM Plex Mono", ui-monospace, monospace; color: #8b8b9a;
      pointer-events: none; text-shadow: 0 1px 4px #000;
    }
    .sp-status strong { color: #a7f3d0; font-weight: 600; }
    .sp-status.is-live strong { color: #6ee7b7; }
    .sp-status.is-err { color: #f87171; }
    .sp-legend {
      position: absolute; top: 0.45rem; right: 0.65rem; z-index: 3;
      font: 0.62rem/1.4 "IBM Plex Mono", ui-monospace, monospace; color: #6b6b7a;
      text-align: right; pointer-events: none;
    }
    .sp-feeds {
      position: absolute; left: 0.55rem; bottom: 5.6rem; z-index: 3;
      max-width: min(44vw, 240px); max-height: 22vh; overflow: auto;
      font: 0.6rem/1.35 "IBM Plex Mono", ui-monospace, monospace; color: #9ca3af;
      background: rgba(10,10,14,0.6); border: 1px solid #222; border-radius: 8px;
      padding: 0.35rem 0.45rem; pointer-events: none;
    }
    .sp-feeds .live { color: #6ee7b7; }
    .sp-pick {
      position: absolute; left: 0.55rem; top: 2.6rem; z-index: 3;
      font: 0.62rem/1.4 "IBM Plex Mono", ui-monospace, monospace;
      color: #c4b5fd; background: rgba(10,10,14,0.75); border: 1px solid #3b2f5c;
      border-radius: 8px; padding: 0.4rem 0.5rem; max-width: min(90vw, 320px);
      pointer-events: auto; display: none;
    }
    .sp-pick.is-show { display: block; }
    .sp-pick button {
      margin-top: 0.3rem; appearance: none; border: 1px solid #555; background: #1a1528;
      color: #ddd; border-radius: 6px; padding: 0.25rem 0.45rem; font-size: 0.62rem; cursor: pointer;
    }
    .sp-hint {
      position: absolute; bottom: 5.7rem; right: 0.65rem; z-index: 3;
      font: 0.6rem/1.35 "IBM Plex Mono", ui-monospace, monospace; color: #555;
      text-align: right; pointer-events: none;
    }
    body.sphere-body .nav { flex-shrink: 0; position: relative; z-index: 4; }
    .sp-light-panel {
      position: absolute; right: 0.55rem; bottom: 5.5rem; z-index: 4;
      width: min(92vw, 260px); max-height: 42vh; overflow: auto;
      background: rgba(12,12,18,0.94); border: 1px solid #2a2a36; border-radius: 10px;
      padding: 0.55rem 0.65rem; font: 0.65rem/1.35 "IBM Plex Mono", ui-monospace, monospace;
      color: #bbb; pointer-events: auto;
    }
    .sp-light-panel[hidden] { display: none !important; }
    .sp-light-panel h4 { margin: 0 0 0.4rem; color: #a7f3d0; font-size: 0.72rem; }
    .sp-light-panel .row {
      display: grid; grid-template-columns: 4.2rem 1fr 2.2rem; gap: 0.3rem;
      align-items: center; margin: 0.22rem 0;
    }
    .sp-light-panel input[type=range] { width: 100%; }
    .sp-light-panel .flash-list { margin-top: 0.4rem; color: #fbbf24; }
    .sp-light-panel button {
      margin-top: 0.35rem; appearance: none; border: 1px solid #444; background: #1a1a22;
      color: #ddd; border-radius: 6px; padding: 0.3rem 0.45rem; font-size: 0.62rem; cursor: pointer;
    }

    /* Burst-style walkie orb + mesh chat (on the sphere ball page) */
    .sp-walkie {
      position: absolute; left: 50%; bottom: 5.4rem; transform: translateX(-50%);
      z-index: 5; width: min(94vw, 380px); pointer-events: auto;
      display: flex; flex-direction: column; align-items: center; gap: 0.4rem;
    }
    .sp-walkie-stage {
      position: relative; width: min(148px, 36vw); height: min(148px, 36vw);
      flex-shrink: 0;
    }
    .sp-walkie-orb {
      position: absolute; inset: 0; border-radius: 50%;
      background:
        radial-gradient(circle at 40% 35%, rgba(125,211,252,.18), transparent 45%),
        radial-gradient(circle at 50% 50%, #12121a 0%, #08080c 70%);
      border: 1px solid rgba(125,211,252,.3);
      box-shadow: 0 0 0 1px rgba(0,0,0,.4), 0 16px 40px rgba(0,0,0,.55);
      overflow: hidden; cursor: pointer; touch-action: none; user-select: none;
    }
    .sp-walkie-orb.tx {
      border-color: rgba(248,113,113,.75);
      box-shadow: 0 0 36px rgba(248,113,113,.28);
      transform: scale(1.04);
    }
    .sp-walkie-orb.rx {
      border-color: rgba(74,222,128,.6);
      box-shadow: 0 0 28px rgba(74,222,128,.22);
    }
    .sp-walkie-orb canvas.ring {
      position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none;
    }
    .sp-walkie-orb canvas.face {
      position: absolute; inset: 18%;
      width: 64%; height: 64%;
      border-radius: 50%;
      image-rendering: pixelated;
      background: #050508;
    }
    .sp-walkie-orb .orb-label {
      position: absolute; left: 0; right: 0; bottom: 10%;
      text-align: center; font: 0.58rem/1 "IBM Plex Mono", ui-monospace, monospace;
      color: #6b6b7a; pointer-events: none;
    }
    .sp-walkie-orb.tx .orb-label { color: #f87171; }
    .sp-walkie-orb.rx .orb-label { color: #4ade80; }
    .sp-walkie-meta {
      font: 0.62rem/1.3 "IBM Plex Mono", ui-monospace, monospace; color: #8b8b9a;
      text-align: center;
    }
    .sp-walkie-meta em { color: #7dd3fc; font-style: normal; }
    .sp-walkie-actions {
      display: flex; flex-wrap: wrap; gap: 0.3rem; justify-content: center;
    }
    .sp-walkie-actions button {
      appearance: none; border: 1px solid #333; background: rgba(18,18,26,0.95);
      color: #ddd; border-radius: 999px; padding: 0.35rem 0.65rem;
      font: 600 0.68rem/1 system-ui, sans-serif; cursor: pointer;
    }
    .sp-walkie-actions button.primary { background: #6ee7b7; color: #042; border-color: transparent; }
    .sp-walkie-chat {
      width: 100%;
      background: rgba(8,8,14,0.9); border: 1px solid #2a2a38; border-radius: 12px;
      padding: 0.45rem 0.55rem; backdrop-filter: blur(8px);
    }
    .sp-walkie-log {
      max-height: 16vh; overflow-y: auto;
      font: 0.7rem/1.35 "Instrument Sans", system-ui, sans-serif; color: #c8c8d4;
      margin-bottom: 0.35rem;
    }
    .sp-walkie-line { margin: 0.2rem 0; word-break: break-word; }
    .sp-walkie-line .who {
      font: 600 0.6rem/1 "IBM Plex Mono", ui-monospace, monospace; color: #7dd3fc;
    }
    .sp-walkie-line.self .who { color: #6ee7b7; }
    .sp-walkie-line.system .who { color: #6b6b7a; }
    .sp-walkie-compose { display: flex; gap: 0.3rem; }
    .sp-walkie-compose input {
      flex: 1; min-width: 0; border: 1px solid #2a2a36; border-radius: 8px;
      background: #12121a; color: #eee; padding: 0.4rem 0.5rem;
      font: 0.72rem/1.2 "Instrument Sans", system-ui, sans-serif;
    }
    .sp-walkie-compose button {
      appearance: none; border: 0; border-radius: 8px; background: #6ee7b7; color: #042;
      font: 600 0.68rem/1 system-ui, sans-serif; padding: 0.4rem 0.65rem; cursor: pointer;
    }
    body.sphere-body.mood-tx .sp-status strong { color: #f87171; }
    body.sphere-body.mood-rx .sp-status strong { color: #4ade80; }
    .sp-walkie-actions button.is-on {
      border-color: #6ee7b7; color: #6ee7b7;
    }
    .sp-cam-help {
      width: 100%;
      background: rgba(40, 20, 20, 0.95);
      border: 1px solid rgba(248, 113, 113, 0.45);
      border-radius: 10px;
      padding: 0.55rem 0.65rem;
      font: 0.68rem/1.4 "Instrument Sans", system-ui, sans-serif;
      color: #fecaca;
    }
    .sp-cam-help[hidden] { display: none !important; }
    .sp-cam-help a { color: #7dd3fc; }
    .sp-cam-help em { color: #fde68a; font-style: normal; }
    .sp-cam-help .sp-cam-mac {
      display: block; margin-top: 0.35rem; color: #9ca3af; font-size: 0.62rem;
    }
    .sp-cam-help .sp-cam-help-actions {
      display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.45rem;
    }
    .sp-cam-help button {
      appearance: none; border: 1px solid #555; background: #1a1a22; color: #eee;
      border-radius: 999px; padding: 0.3rem 0.55rem; font-size: 0.62rem; cursor: pointer;
    }
    .sp-cam-help button.primary { background: #6ee7b7; color: #042; border-color: transparent; }
  </style>
</head>
<body class="sphere-body">
  <header class="nav" id="site-nav" data-active="sphere" data-site-nav></header>
  <script src="site-nav.js"></script>

  <div class="sp-wrap">
    <div id="sp-boot" style="position:absolute;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:0.6rem;background:#07070a;color:#9ca3af;font:0.85rem/1.4 system-ui,sans-serif;pointer-events:none">
      <div style="width:2.5rem;height:2.5rem;border-radius:50%;border:2px solid #333;border-top-color:#6ee7b7;animation:sp-boot 0.8s linear infinite"></div>
      <div id="sp-boot-msg">Loading Glyph Sphere…</div>
    </div>
    <style>@keyframes sp-boot{to{transform:rotate(360deg)}} #sp-boot.is-err{color:#f87171} #sp-boot.is-done{display:none!important}</style>
    <canvas id="sp-gl" aria-label="16K addressable Sphere venue"></canvas>
    <canvas id="sp-hud" aria-hidden="true"></canvas>
    <div class="sp-status" id="sp-status">Venue 16K · walkie burst on the sphere ball</div>
    <div class="sp-legend" id="sp-legend">hold orb = TX · peer frames light seats<br/>chat mesh · bulk · lights</div>
    <div class="sp-pick" id="sp-pick"></div>
    <div class="sp-feeds" id="sp-feeds" hidden></div>
    <p class="sp-hint">drag orbit · scroll zoom · click pick<br/>hold orb / Space = walkie · phone cast</p>

    <!-- Burst walkie orb + mesh chat (ball is the 3D sphere behind) -->
    <div class="sp-walkie" id="sp-walkie" aria-label="Sphere walkie burst">
      <div class="sp-walkie-stage">
        <div class="sp-walkie-orb" id="sp-walkie-orb" role="button" aria-label="Hold to walkie burst" tabindex="0">
          <canvas class="ring" id="sp-walkie-ring" width="280" height="280"></canvas>
          <canvas class="face" id="sp-walkie-face" width="25" height="25"></canvas>
          <span class="orb-label" id="sp-walkie-label">hold</span>
        </div>
      </div>
      <p class="sp-walkie-meta" id="sp-walkie-meta">idle · connect hub · hold orb · cast sphere</p>
      <div class="sp-walkie-actions">
        <button type="button" class="primary" id="sp-walkie-hold">Hold burst</button>
        <button type="button" id="sp-walkie-cam">Enable cam</button>
        <button type="button" class="is-on" id="sp-walkie-cast-mode" title="Project glyph across the whole dome">Cast: sphere</button>
      </div>
      <div class="sp-cam-help" id="sp-cam-help" hidden>
        <div class="sp-cam-help-body"></div>
        <div class="sp-cam-help-actions">
          <button type="button" class="primary" id="sp-cam-retry">Retry cam</button>
          <button type="button" id="sp-cam-localhost" onclick="location.href='http://127.0.0.1:9876/sphere.html'">Open localhost</button>
          <button type="button" id="sp-cam-dismiss">Dismiss</button>
        </div>
      </div>
      <div class="sp-walkie-chat">
        <div class="sp-walkie-log" id="sp-walkie-log" role="log" aria-live="polite"></div>
        <div class="sp-walkie-compose">
          <input type="text" id="sp-walkie-input" placeholder="Mesh chat…" autocomplete="off" />
          <button type="button" id="sp-walkie-send">Send</button>
        </div>
      </div>
    </div>

    <div class="sp-bar">
      <input type="text" id="sp-hub" placeholder="ws://HOST:9876/" autocomplete="off" spellcheck="false" />
      <button type="button" class="primary" id="sp-connect">Connect</button>
      <button type="button" id="sp-wave" class="is-on">Wave on</button>
      <select id="sp-wave-mode" aria-label="Wave mode">
        <option value="cascade" selected>cascade ↓</option>
        <option value="azimuth">azimuth ○</option>
        <option value="spiral">spiral</option>
        <option value="lat">latitude</option>
      </select>
      <label>spd <input type="range" id="sp-wave-speed" min="0.25" max="3" step="0.25" value="1" /></label>
      <select id="sp-view" aria-label="Camera view" title="Camera viewing position">
        <option value="orbit">Orbit free</option>
      </select>
      <select id="sp-bulk-kind" aria-label="Bulk kind" title="Bulk activate kind">
        <option value="section">section</option>
        <option value="chunk">chunk</option>
        <option value="zone">zone</option>
        <option value="rect">LED rect</option>
      </select>
      <select id="sp-bulk-val" aria-label="Bulk value" title="Bulk target"></select>
      <button type="button" id="sp-bulk">Bulk activate</button>
      <button type="button" id="sp-bulk-cast">Bulk cast demo</button>
      <button type="button" id="sp-bulk-clear">Clear bulk</button>
      <button type="button" id="sp-lights" title="Venue lighting panel">Lights</button>
      <button type="button" id="sp-demo">Demo</button>
      <button type="button" id="sp-clear">Clear live</button>
    </div>
    <div class="sp-light-panel" id="sp-light-panel" hidden></div>
  </div>

  <script src="sphere-seating.js"></script>
  <script src="venue-canvas.js"></script>
  <script src="venue-lighting.js"></script>
  <script src="sphere-walkie.js"></script>
  <script src="sphere.js"></script>
</body>
</html>

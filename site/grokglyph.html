<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>GrokGlyph · 25×25 luminance mesh</title>
  <meta name="description" content="GrokGlyph PWA — full-page multi-user 25×25 Glyph Matrix with 1px mesh stack, header essentials, footer drawer." />
  <meta name="theme-color" content="#0c0c0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GrokGlyph" />
  <link rel="manifest" href="manifest-grokglyph.webmanifest" />
  <link rel="icon" href="icons/grokglyph.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/grokglyph-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="grokglyph.css" />
</head>
<body class="gg-body">
  <div class="noise" aria-hidden="true"></div>

  <!-- slim header: main needs only -->
  <header class="gg-header" id="gg-header">
    <a class="gg-brand" href="./" title="GrokYtalkY home">
      <span class="brand-mark">◈</span>
      <span class="gg-brand-name">GrokGlyph</span>
    </a>

    <div class="gg-header-main" role="toolbar" aria-label="Main controls">
      <button type="button" class="gg-hbtn primary" id="gg-add" title="Add peer">+</button>
      <button type="button" class="gg-hbtn" id="gg-mesh-toggle" title="Mesh join" aria-pressed="true">mesh</button>
      <button type="button" class="gg-hbtn" id="gg-nfc-add" title="NFC tap add">nfc</button>
      <span class="gg-status" id="gg-status" aria-live="polite">
        <span id="gg-count-label">0</span>
        <span class="gg-status-sep">·</span>
        <span id="gg-scale-label">—</span>
        <span class="gg-status-sep gg-hide-narrow">·</span>
        <span id="gg-mesh-label" class="gg-hide-narrow">mesh</span>
      </span>
    </div>

    <button type="button" class="gg-hbtn gg-drawer-toggle" id="gg-drawer-toggle"
      aria-expanded="false" aria-controls="gg-drawer" title="Open controls">
      <span class="gg-drawer-icon" aria-hidden="true">☰</span>
      <span class="gg-drawer-label">more</span>
    </button>
  </header>

  <!-- full remaining page: side-by-side glyphs, 1px gutters -->
  <main class="gg-stage-wrap" id="gg-stage-wrap">
    <div class="gg-stage" id="gg-stage" role="list" aria-label="Glyph Matrix users"></div>
    <svg class="gg-mesh-svg" id="gg-mesh-svg" aria-hidden="true"></svg>
  </main>

  <!-- footer bar + pop-up drawer for the rest -->
  <div class="gg-drawer-root" id="gg-drawer-root">
    <div class="gg-drawer-scrim" id="gg-drawer-scrim" hidden></div>

    <aside class="gg-drawer" id="gg-drawer" aria-hidden="true" aria-label="Controls drawer">
      <div class="gg-drawer-handle" id="gg-drawer-handle" role="button" tabindex="0"
        aria-label="Toggle drawer">
        <span class="gg-handle-bar" aria-hidden="true"></span>
        <span class="gg-handle-text">controls</span>
      </div>

      <div class="gg-drawer-body">
        <section class="gg-drawer-sec" aria-label="Identity">
          <label class="gg-nick-label">
            You
            <input type="text" id="gg-nick" maxlength="16" placeholder="nick" autocomplete="nickname" />
          </label>
          <button type="button" class="btn ghost" id="gg-install" hidden>Install app</button>
        </section>

        <section class="gg-drawer-sec" aria-label="Compass add and subtract">
          <h2 class="gg-h2">Compass</h2>
          <div class="gg-compass">
            <div class="gg-compass-pad">
              <button type="button" class="gg-cbtn" data-dir="n" title="Add north" aria-label="Add peer north">N+</button>
              <button type="button" class="gg-cbtn" data-dir="w" title="Add west" aria-label="Add peer west">W+</button>
              <div class="gg-compass-core" title="You">YOU</div>
              <button type="button" class="gg-cbtn" data-dir="e" title="Add east" aria-label="Add peer east">E+</button>
              <button type="button" class="gg-cbtn" data-dir="s" title="Add south" aria-label="Add peer south">S+</button>
            </div>
            <div class="gg-compass-sub">
              <button type="button" class="btn ghost gg-sub" data-sub="n" title="Remove northmost">−N</button>
              <button type="button" class="btn ghost gg-sub" data-sub="e" title="Remove eastmost">−E</button>
              <button type="button" class="btn ghost gg-sub" data-sub="s" title="Remove southmost">−S</button>
              <button type="button" class="btn ghost gg-sub" data-sub="w" title="Remove westmost">−W</button>
            </div>
          </div>
        </section>

        <section class="gg-drawer-sec" aria-label="Peer list">
          <h2 class="gg-h2">On room <span id="gg-cap-hint" class="gg-muted"></span></h2>
          <ul id="gg-roster" class="gg-roster-list"></ul>
          <p class="gg-hint" id="gg-nfc-hint">
            NFC: tap a tag or peer phone (NDEF text/url with id=…). Delete from roster or long-press a glyph.
          </p>
        </section>

        <section class="gg-drawer-sec gg-drawer-links" aria-label="Site">
          <a href="./">Home</a>
          <a href="burst.html">Burst</a>
          <a href="chat.html">Chat</a>
          <a href="docs.html">Docs</a>
          <a href="https://github.com/fornevercollective/GrokYtalkY">GitHub</a>
        </section>
      </div>
    </aside>
  </div>

  <script src="grokglyph.js"></script>
</body>
</html>
